{
  "schema_version": "target_registry_v1",
  "description": "Registry-owned target definitions for event and player-season prediction heads.",
  "targets": {
    "ev": {
      "group": "physics",
      "level": "event",
      "column": "launch_speed",
      "kind": "regression",
      "loss": "huber",
      "metrics": ["mae", "rmse", "r2"],
      "required": true,
      "requires_pa_manifest": false
    },
    "la": {
      "group": "physics",
      "level": "event",
      "column": "launch_angle",
      "kind": "regression",
      "loss": "huber",
      "metrics": ["mae", "rmse", "r2"],
      "required": true,
      "requires_pa_manifest": false
    },
    "hard_hit": {
      "group": "quality",
      "level": "event",
      "column": "target_hard_hit",
      "kind": "binary",
      "loss": "bce",
      "metrics": ["f1", "brier"],
      "required": true,
      "requires_pa_manifest": false,
      "derived_from": "launch_speed >= 95"
    },
    "barrel": {
      "group": "quality",
      "level": "event",
      "column": "target_barrel",
      "kind": "binary",
      "loss": "bce",
      "metrics": ["f1", "brier"],
      "required": true,
      "requires_pa_manifest": false,
      "derived_from": "Statcast barrel label or documented EV/LA rule"
    },
    "xba": {
      "group": "expected",
      "level": "event",
      "column": "estimated_ba_using_speedangle",
      "kind": "probability",
      "loss": "mse",
      "metrics": ["mae", "rmse"],
      "required": false,
      "requires_pa_manifest": false
    },
    "xwoba": {
      "group": "expected",
      "level": "event",
      "column": "estimated_woba_using_speedangle",
      "kind": "regression",
      "loss": "huber",
      "metrics": ["mae", "rmse", "spearman"],
      "required": false,
      "requires_pa_manifest": false
    },
    "avg_ev": {
      "group": "aggregate",
      "level": "player_season",
      "column": "target_avg_ev",
      "kind": "regression",
      "loss": "huber",
      "metrics": ["mae", "rmse", "spearman"],
      "required": false,
      "requires_pa_manifest": false
    },
    "avg_la": {
      "group": "aggregate",
