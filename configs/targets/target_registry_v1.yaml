      "column": "target_avg_xba",
      "kind": "probability",
      "loss": "mse",
      "metrics": ["mae", "rmse", "spearman"],
      "required": false,
      "requires_pa_manifest": false
    },
    "avg_xwoba": {
      "group": "aggregate",
      "level": "player_season",
      "column": "target_avg_xwoba",
      "kind": "regression",
      "loss": "huber",
      "metrics": ["mae", "rmse", "spearman"],
      "required": false,
      "requires_pa_manifest": false
    },
    "hard_hit_rate": {
      "group": "aggregate",
